<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f8f8f8;
      --border: #e0e0e0;
      --text: #1a1a1a;
      --text-muted: #666;
      --accent: #333;
      --accent-light: #111;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    a { color: var(--accent-light); text-decoration: none; transition: color 0.2s; }
    a:hover { color: #000; }

    .container { max-width: 800px; margin: 0 auto; padding: 0 24px; }

    /* Header */
    .site-header {
      padding: 30px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .site-header h1 { font-size: 1.3rem; font-weight: 700; }
    .site-header h1 a { color: var(--text); }
    .site-header h1 a:hover { color: var(--accent-light); }
    .site-nav { display: flex; gap: 8px; }
    .site-nav a {
      padding: 6px 16px;
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    .site-nav a:hover { background: var(--surface); color: #000; }

    /* Section */
    section {
      padding: 60px 0;
      border-bottom: 1px solid var(--border);
    }
    section:last-child { border-bottom: none; }

    .section-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--accent);
      margin-bottom: 32px;
      font-weight: 600;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 28px;
      margin-bottom: 20px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: var(--accent); }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .card-header h3 { font-size: 1.15rem; font-weight: 600; }
    .card-header .period { color: var(--text-muted); font-size: 0.85rem; }
    .card-role { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 12px; }
    .card ul { padding-left: 20px; }
    .card li { margin-bottom: 6px; font-size: 0.95rem; color: var(--text); }
    .card li li { color: var(--text-muted); font-size: 0.9rem; }

    .badge {
      display: inline-block;
      background: rgba(0, 0, 0, 0.06);
      color: var(--accent);
      padding: 2px 10px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 500;
      margin-left: 8px;
    }

    /* Skills */
    .skills-grid {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 12px 24px;
      font-size: 0.95rem;
    }
    .skills-grid dt { color: var(--text-muted); font-weight: 500; }
    .skills-grid dd { color: var(--text); }

    /* Portfolio links */
    .portfolio-links {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .portfolio-links a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-weight: 500;
      transition: all 0.2s;
    }
    .portfolio-links a:hover {
      border-color: var(--accent);
      color: var(--accent-light);
    }
    .portfolio-links svg { width: 18px; height: 18px; }

    /* CV tabs */
    .cv-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .cv-tabs button {
      padding: 8px 20px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.9rem;
      font-family: inherit;
      transition: all 0.2s;
    }
    .cv-tabs button.active {
      background: var(--text);
      border-color: var(--text);
      color: #fff;
    }
    .cv-tabs button:hover:not(.active) {
      border-color: var(--accent);
      color: var(--text);
    }
    .cv-viewer {
      width: 100%;
      height: 800px;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .cv-viewer iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Blog */
    .post-list { list-style: none; padding: 0; }
    .post-list li {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px 28px;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .post-list li:hover { border-color: var(--accent); }
    .post-date { color: var(--text-muted); font-size: 0.85rem; }
    .post-title { font-size: 1.15rem; font-weight: 600; margin: 4px 0 8px; }
    .post-title a { color: var(--text); }
    .post-title a:hover { color: var(--accent-light); }
    .post-excerpt { color: var(--text-muted); font-size: 0.95rem; }

    /* Post content */
    .post-content { padding: 60px 0; }
    .post-content h1 { font-size: 2rem; margin-bottom: 8px; }
    .post-content .post-meta { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 40px; }
    .post-content h2 { font-size: 1.4rem; margin: 40px 0 16px; color: var(--text); }
    .post-content h3 { font-size: 1.15rem; margin: 32px 0 12px; }
    .post-content p { margin-bottom: 16px; }
    .post-content ul, .post-content ol { padding-left: 24px; margin-bottom: 16px; }
    .post-content li { margin-bottom: 4px; }
    .post-content code {
      background: var(--surface);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
    }
    .post-content pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      overflow-x: auto;
      margin-bottom: 16px;
    }
    .post-content pre code { background: none; padding: 0; }
    .post-content img {
      max-width: 100%;
      border-radius: 8px;
      margin: 16px 0;
    }
    .post-content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 16px;
      color: var(--text-muted);
      margin: 16px 0;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 40px 0;
      color: var(--text-muted);
      font-size: 0.85rem;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 12px; }
      .skills-grid { grid-template-columns: 1fr; }
      .card-header { flex-direction: column; }
      .cv-viewer { height: 500px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header class="site-header">
      <h1><a href="{{ '/' | relative_url }}">엄준서</a></h1>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/blog/' | relative_url }}">Blog</a>
      </nav>
    </header>

    {{ content }}

    <footer>
      <p>&copy; 2026 엄준서. All rights reserved.</p>
    </footer>
  </div>

</body>
</html>
